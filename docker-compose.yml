services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: vanilla-netrek-image
    container_name: vanilla-netrek-server
    ports:
      - "2692:2592"
      - "2693-2729:2593-2629/udp"
    entrypoint: ["/bin/bash", "/opt/netrek/server-entrypoint.sh"]
    volumes:
      - ./server/entrypoint.sh:/opt/netrek/server-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "netrekd"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  client:
    image: vanilla-netrek-image
    container_name: vanilla-netrek-client
    depends_on:
      server:
        condition: service_healthy
    environment:
      - DISPLAY=host.docker.internal:0
      - PULSE_SERVER=tcp:host.docker.internal:4713
      - SDL_AUDIODRIVER=pulse
      - SOUNDDIR=/usr/local/src/netrek/netrek-client-cow/sounds
      - NETREK_SERVER=server
    entrypoint: ["/bin/bash", "/opt/netrek/client-entrypoint.sh"]
    volumes:
      - ./client-dev/entrypoint.sh:/opt/netrek/client-entrypoint.sh:ro

  pygame-client:
    build:
      context: .
      dockerfile: pygame-client/Dockerfile
    image: netrek-pygame-client
    container_name: netrek-pygame-client
    depends_on:
      server:
        condition: service_healthy
    environment:
      - DISPLAY=host.docker.internal:0
      - NETREK_SERVER=server
      - NETREK_PORT=2592

  paradise-server:
    profiles:
      - paradise
    build:
      context: .
      dockerfile: paradise-server/Dockerfile
    image: netrek-paradise-server
    container_name: paradise-netrek-server
    ports:
      - "2692:2592"
      - "2691:2591"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "listen"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
